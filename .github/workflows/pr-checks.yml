name: PR Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.25"

jobs:
  go-tests:
    name: Go Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go/go.sum

      - name: Run Go tests with race detection
        working-directory: go
        run: go test -race -v ./...

      - name: Run Go linting
        working-directory: go
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./... --timeout 5m || true

      - name: Run go vet
        working-directory: go
        run: go vet ./...

      - name: Run go mod verify
        working-directory: go
        run: go mod verify

  go-build:
    name: Go Backend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go/go.sum

      - name: Build Go binary
        working-directory: go
        run: go build -v ./...

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (check only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-lint:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: latest

      - name: Lint Helm chart
        run: helm lint helm --values helm/values.yaml

      - name: Template Helm chart
        run: helm template rightsizer helm --values helm/values.yaml

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run gosec security scanner
        working-directory: go
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt json ./... > gosec-results.json || true

  summary:
    name: Check Summary
    runs-on: ubuntu-latest
    needs: [go-tests, go-build, docker-build, helm-lint, code-quality, security-scan]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          echo "All checks completed!"
          echo "Go Tests: ${{ needs.go-tests.result }}"
          echo "Go Build: ${{ needs.go-build.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"
          echo "Helm Lint: ${{ needs.helm-lint.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"

      - name: PR status report
        if: github.event_name == 'pull_request'
        run: echo "✅ PR checks completed. Review results above."
